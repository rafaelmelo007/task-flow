services:
  api:
    build:
      context: .
      dockerfile: src/TaskFlow.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Production
      # Jwt__Secret MUST be set in the host environment or a .env file — no default is provided intentionally.
      Jwt__Secret: ${Jwt__Secret}
      Jwt__Issuer: TaskFlow.Api
      Jwt__Audience: TaskFlow.Client
      ConnectionStrings__DefaultConnection: Data Source=/data/taskflow.db
      Seed__Enabled: "true"
    volumes:
      - db_data:/data
    ports:
      - "5080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "4200:8080"
    depends_on:
      api:
        condition: service_healthy

volumes:
  db_data:
